spring.application.name=api-gateway
spring.config.import=optional:configserver:http://config-server:8888
#spring.config.import=configserver:http://localhost:8888
spring.cloud.config.enabled=true
spring.cloud.config.fail-fast=false
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-attempts=6

eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Swagger Aggregation
springdoc.swagger-ui.urls[0].name=Authentication Service
springdoc.swagger-ui.urls[0].url=/authentication-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=User Service
springdoc.swagger-ui.urls[1].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Mentor Service
springdoc.swagger-ui.urls[2].url=/mentor-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Skill Service
springdoc.swagger-ui.urls[3].url=/skill-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=Review Service
springdoc.swagger-ui.urls[4].url=/review-service/v3/api-docs
springdoc.swagger-ui.urls[5].name=Session Service
springdoc.swagger-ui.urls[5].url=/session-service/v3/api-docs
springdoc.swagger-ui.urls[6].name=Group Service
springdoc.swagger-ui.urls[6].url=/group-service/v3/api-docs

# Global CORS Configuration for Gateway
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*